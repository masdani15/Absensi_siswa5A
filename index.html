<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Siswa Kelas 5A & 5B</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        
        /* Merapikan Header */
        h2 { color: #333; margin-bottom: 0; font-size: 1.2rem; }
        h1 { color: var(--primary); margin-top: 5px; margin-bottom: 5px; font-size: 1.5rem; }
        
        #tgl { color: #888; font-size: 0.85rem; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; text-align: left; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; margin-bottom: 15px; outline: none; background-color: #fff; cursor: pointer; }
        select:focus { border-color: var(--primary); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #357abd; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="box">
    <h2>Presensi Online</h2>
    <h1>Kelas 5A dan 5B</h1>
    <div id="tgl"></div>
    
    <label for="pilihKelas">1. Pilih Kelas:</label>
    <select id="pilihKelas" onchange="updateNama()">
        <option value="" disabled selected>-- Pilih Kelas --</option>
        <option value="5A">Kelas 5A</option>
        <option value="5B">Kelas 5B</option>
    </select>

    <label for="namaSiswa">2. Pilih Nama Kamu:</label>
    <select id="namaSiswa" disabled>
        <option value="" disabled selected>-- Pilih Kelas Dulu --</option>
    </select>

    <button id="btnHadir" onclick="kirimAbsen()">SAYA HADIR</button>
    <div id="status"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxW4U3F36mbA_jR6hCv6PfsBkk6Y6Orz9rs5dUewGuMJHGe0Qgx1AlJSqq_JoF9dJ8W/exec';
    
    const daftarSiswa = {
        "5A": [
            "ADI PUTRA ANDIKA", "ALFARO PUTRA MUSA", "ANDI AFDHALUL FAUZAN", "ANUGERAH INGAN", 
            "AURA LATISHA IQRAM MALEWA", "DWI JULIA RAMADHANI", "FALERIANI ASESIATI", 
            "GUMILAR FIRMANSYAH", "KRISTOFORUS DERIKO NANA", "MATIAS ALAN SIO PUTRA", 
            "MUHAMMAD AZBIN AZIB", "MUHAMMAD DAFI", "NAUFAL AMIRUL MUJIB", "NUR AFNISARI", 
            "NUR ALIYAH", "NURUL IBNU FAHIRAH", "RAISHA NAZIFA LUBIS", "RANDI FRANCISKUS SINURAT", 
            "SEPTIANA TRISNA INUL", "SINTYA WELASARI", "SISI AGUSTINA", "YULIANA MAHUL"
        ],
        "5B": [
            "AHMAD MAULANA NURHUDA", "ARYA SHAPUTRA", "BAYU PRATAMA", "FITRA", 
            "FITRI RAHMAWATI", "KRISTO IMMANUEL", "M. IRFAN K", "MARIANUS SIBU LAKA", 
            "MASYA BUTARBUTAR", "MOLGAN SAPUTRA", "MUHAMMAD ALIF VERUL VAHMI", 
            "MUHAMMAD ARI SANDI", "NIRMADANI", "NUR FADILAH", "NUR RAVINA TASYA HALIM", 
            "RAHIM FEBRIANSYAH FADILLAH", "RHATU RIHANA", "SITI ANUGRAH", "Sul Fikal", 
            "YOHANES NEYMAR DE PAMA", "YOHANES PUTRA JONGKOM", "ZHAKILA ADELIA PUTRY"
        ]
    };

    const hariIni = new Date().toLocaleDateString('en-CA');
    document.getElementById('tgl').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    window.onload = function() {
        if (localStorage.getItem('absensi_siswa_v3') === hariIni) {
            kunciTampilan();
        }
    };

    function updateNama() {
        const kelas = document.getElementById('pilihKelas').value;
        const selectNama = document.getElementById('namaSiswa');
        
        selectNama.innerHTML = '<option value="" disabled selected>-- Pilih Nama Kamu --</option>';
        selectNama.disabled = false;

        daftarSiswa[kelas].forEach(siswa => {
            let opt = document.createElement('option');
            opt.value = siswa;
            opt.innerHTML = siswa;
            selectNama.appendChild(opt);
        });
    }

    function kunciTampilan() {
        document.getElementById('btnHadir').disabled = true;
        document.getElementById('pilihKelas').disabled = true;
        document.getElementById('namaSiswa').disabled = true;
        document.getElementById('btnHadir').innerText = "SUDAH ABSEN";
        document.getElementById('status').innerText = "✅ Kamu sudah absen hari ini.";
        document.getElementById('status').style.color = "green";
    }

    async function kirimAbsen() {
        const kelas = document.getElementById('pilihKelas').value;
        const nama = document.getElementById('namaSiswa').value;
        const btn = document.getElementById('btnHadir');
        const st = document.getElementById('status');

        if (!kelas || !nama) { 
            Swal.fire({ icon: 'warning', title: 'Belum Lengkap', text: 'Pilih Kelas dan Nama dulu ya!', confirmButtonColor: '#4a90e2' });
            return; 
        }

        btn.disabled = true;
        btn.innerText = "Mengirim...";

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ nama: nama, kelas: kelas })
            });

            localStorage.setItem('absensi_siswa_v3', hariIni);
            kunciTampilan();
            
            Swal.fire({
                icon: 'success',
                title: 'Berhasil!',
                text: `Terima kasih ${nama} dari kelas ${kelas}, absen kamu sudah masuk!`,
                confirmButtonColor: '#4a90e2'
            });
            
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'Gagal', text: 'Coba lagi ya!', confirmButtonColor: '#4a90e2' });
            btn.disabled = false;
            btn.innerText = "SAYA HADIR";
        }
    }
</script>
</body>
</html>
